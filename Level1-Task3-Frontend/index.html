<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full-Stack Assignment - User Management</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>User Management System</h1>
            <p>Full-Stack Development Assignment - Level 1</p>
        </header>

        <main>
            <!-- User Form Section -->
            <section class="form-section">
                <h2 id="formTitle">Add New User</h2>
                <form id="userForm">
                    <input type="hidden" id="userId">
                    <div class="form-group">
                        <label for="name">Name:</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="age">Age:</label>
                        <input type="number" id="age" name="age" min="1" max="120" required>
                    </div>
                    <div class="form-buttons">
                        <button type="submit" id="submitBtn" class="btn btn-primary">Add User</button>
                        <button type="button" id="cancelBtn" class="btn btn-secondary">Cancel</button>
                    </div>
                </form>
            </section>

            <!-- Users List Section -->
            <section class="list-section">
                <div class="section-header">
                    <h2>Users List</h2>
                    <button id="refreshBtn" class="btn btn-secondary">Refresh</button>
                </div>
                <div id="loading" class="loading">Loading users...</div>
                <div id="usersList" class="users-grid"></div>
                <div id="noUsers" class="no-users" style="display: none;">
                    <p>No users found. Add your first user!</p>
                </div>
            </section>
        </main>

        <!-- Message Modal -->
        <div id="messageModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h3 id="modalTitle">Message</h3>
                <p id="modalMessage"></p>
            </div>
        </div>
    </div>

    <script src="../js/app.js"></script>
</body>
</html>
